name: fuel_dost
description: "FuelDost - Smart fuel cost calculator & expense tracker for India"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  http: ^1.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.70.2
  intl: ^0.19.0
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  uuid: ^4.5.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  rxdart: ^0.28.0
  url_launcher: ^6.3.1
  lottie: ^3.1.3
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/image/
